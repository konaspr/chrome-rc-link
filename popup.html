<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right-Click Open Link</title>
  <style>
    body {
      width: 240px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    .site {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      padding: 4px 0;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="site" id="site-label"></div>
  <label>
    <input type="checkbox" id="site-toggle">
    Enabled on this site
  </label>
  <hr>
  <label>
    <input type="checkbox" id="bg-toggle">
    Open links in background
  </label>
  <script src="popup.js"></script>
</body>
</html>
